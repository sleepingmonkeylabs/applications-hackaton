<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="700">Stiftelser RAG Pipeline</text>
  <text x="700" y="78" text-anchor="middle" fill="#94a3b8" font-size="14">JSON ingest → embedded chunks → query-time retrieval → application drafts</text>

  <!-- ============ PHASE 1 ============ -->
  <rect x="30" y="110" width="1340" height="240" rx="14" fill="#0b1220" stroke="#1e293b" stroke-width="1.5"/>
  <text x="56" y="140" fill="#cbd5e1" font-size="15" font-weight="600">Phase 1 · Infrastructure</text>
  <text x="245" y="140" fill="#22c55e" font-size="13" font-weight="600">✓ built</text>

  <!-- n1: JSON source -->
  <g filter="url(#shadow)">
    <rect x="60" y="180" width="180" height="140" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
    <text x="150" y="220" text-anchor="middle" fill="#e0f2fe" font-size="15" font-weight="700">JSON source</text>
    <text x="150" y="252" text-anchor="middle" fill="#bae6fd" font-size="12">static today,</text>
    <text x="150" y="270" text-anchor="middle" fill="#bae6fd" font-size="12">scraper later</text>
  </g>

  <!-- n2: Polars -->
  <g filter="url(#shadow)">
    <rect x="280" y="180" width="180" height="140" rx="12" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="370" y="220" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">Polars frame</text>
    <text x="370" y="252" text-anchor="middle" fill="#cbd5e1" font-size="12">schema-agnostic</text>
    <text x="370" y="270" text-anchor="middle" fill="#cbd5e1" font-size="12">loader</text>
  </g>

  <!-- n3: Postgres stiftelser -->
  <g filter="url(#shadow)">
    <rect x="500" y="180" width="180" height="140" rx="12" fill="#3b2410" stroke="#f59e0b" stroke-width="2"/>
    <text x="590" y="216" text-anchor="middle" fill="#fef3c7" font-size="15" font-weight="700">Postgres</text>
    <text x="590" y="240" text-anchor="middle" fill="#fde68a" font-size="13" font-style="italic">stiftelser</text>
    <text x="590" y="266" text-anchor="middle" fill="#fcd34d" font-size="12">17,476 rows</text>
    <text x="590" y="284" text-anchor="middle" fill="#fcd34d" font-size="11">structured metadata</text>
  </g>

  <!-- n4: pick text (diamond) -->
  <g filter="url(#shadow)">
    <polygon points="720,250 810,180 900,250 810,320" fill="#3f1d2e" stroke="#ec4899" stroke-width="2"/>
    <text x="810" y="244" text-anchor="middle" fill="#fce7f3" font-size="13" font-weight="700">pick text field</text>
    <text x="810" y="266" text-anchor="middle" fill="#fbcfe8" font-size="12" font-style="italic">andamal</text>
  </g>

  <!-- n5: chunk + embed -->
  <g filter="url(#shadow)">
    <rect x="940" y="180" width="180" height="140" rx="12" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="1030" y="220" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">chunk + embed</text>
    <text x="1030" y="252" text-anchor="middle" fill="#cbd5e1" font-size="12">e5 multilingual</text>
    <text x="1030" y="270" text-anchor="middle" fill="#cbd5e1" font-size="11">"passage: " prefix</text>
  </g>

  <!-- n6: chunks table -->
  <g filter="url(#shadow)">
    <rect x="1160" y="180" width="180" height="140" rx="12" fill="#3b2410" stroke="#f59e0b" stroke-width="2"/>
    <text x="1250" y="216" text-anchor="middle" fill="#fef3c7" font-size="15" font-weight="700">chunks</text>
    <text x="1250" y="244" text-anchor="middle" fill="#fde68a" font-size="12">pgvector</text>
    <text x="1250" y="262" text-anchor="middle" fill="#fde68a" font-size="12">HNSW · cosine</text>
  </g>

  <!-- Phase 1 arrows -->
  <line x1="240" y1="250" x2="275" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="257" y="240" text-anchor="middle" fill="#64748b" font-size="11">ingest</text>

  <line x1="460" y1="250" x2="495" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="478" y="240" text-anchor="middle" fill="#64748b" font-size="11">COPY</text>

  <line x1="680" y1="250" x2="717" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="699" y="240" text-anchor="middle" fill="#64748b" font-size="11">select</text>

  <line x1="903" y1="250" x2="935" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="919" y="240" text-anchor="middle" fill="#64748b" font-size="11">split</text>

  <line x1="1120" y1="250" x2="1155" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1138" y="240" text-anchor="middle" fill="#64748b" font-size="11">upsert</text>

  <!-- ============ PHASE 2 ============ -->
  <rect x="30" y="490" width="1340" height="240" rx="14" fill="#0b1220" stroke="#1e293b" stroke-width="1.5"/>
  <text x="56" y="520" fill="#cbd5e1" font-size="15" font-weight="600">Phase 2 · Retrieval &amp; Drafting</text>
  <text x="298" y="520" fill="#f59e0b" font-size="13" font-weight="600">⚒ next</text>

  <!-- n1: query -->
  <g filter="url(#shadow)">
    <rect x="60" y="560" width="180" height="140" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
    <text x="150" y="600" text-anchor="middle" fill="#e0f2fe" font-size="15" font-weight="700">user query</text>
    <text x="150" y="630" text-anchor="middle" fill="#bae6fd" font-size="12">programme</text>
    <text x="150" y="648" text-anchor="middle" fill="#bae6fd" font-size="12">profile</text>
  </g>

  <!-- n2: embed query -->
  <g filter="url(#shadow)">
    <rect x="280" y="560" width="180" height="140" rx="12" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="370" y="600" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">embed query</text>
    <text x="370" y="632" text-anchor="middle" fill="#cbd5e1" font-size="12">"query: " prefix</text>
    <text x="370" y="650" text-anchor="middle" fill="#cbd5e1" font-size="11">same e5 model</text>
  </g>

  <!-- n3: ANN top-K -->
  <g filter="url(#shadow)">
    <rect x="500" y="560" width="180" height="140" rx="12" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="590" y="600" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">ANN top-K</text>
    <text x="590" y="632" text-anchor="middle" fill="#cbd5e1" font-size="12">K = 10 chunks</text>
    <text x="590" y="650" text-anchor="middle" fill="#cbd5e1" font-size="11">cosine over HNSW</text>
  </g>

  <!-- n4: LLM relevance (diamond) -->
  <g filter="url(#shadow)">
    <polygon points="720,630 810,560 900,630 810,700" fill="#3f1d2e" stroke="#ec4899" stroke-width="2"/>
    <text x="810" y="620" text-anchor="middle" fill="#fce7f3" font-size="13" font-weight="700">LLM relevance</text>
    <text x="810" y="640" text-anchor="middle" fill="#fbcfe8" font-size="11">tunable threshold</text>
    <text x="810" y="656" text-anchor="middle" fill="#fbcfe8" font-size="11">+ rubric</text>
  </g>

  <!-- n5: top 3 -->
  <g filter="url(#shadow)">
    <rect x="940" y="560" width="180" height="140" rx="12" fill="#3b2410" stroke="#f59e0b" stroke-width="2"/>
    <text x="1030" y="600" text-anchor="middle" fill="#fef3c7" font-size="15" font-weight="700">top 3</text>
    <text x="1030" y="625" text-anchor="middle" fill="#fde68a" font-size="13">foundations</text>
    <text x="1030" y="652" text-anchor="middle" fill="#fcd34d" font-size="11">best-fit picks</text>
  </g>

  <!-- n6: 3 application drafts -->
  <g filter="url(#shadow)">
    <rect x="1160" y="560" width="180" height="140" rx="12" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
    <text x="1250" y="595" text-anchor="middle" fill="#dcfce7" font-size="15" font-weight="700">3 application</text>
    <text x="1250" y="615" text-anchor="middle" fill="#dcfce7" font-size="15" font-weight="700">drafts</text>
    <text x="1250" y="648" text-anchor="middle" fill="#bbf7d0" font-size="11">per-foundation,</text>
    <text x="1250" y="664" text-anchor="middle" fill="#bbf7d0" font-size="11">ready to review</text>
  </g>

  <!-- Phase 2 arrows -->
  <line x1="240" y1="630" x2="275" y2="630" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="257" y="620" text-anchor="middle" fill="#64748b" font-size="11">embed</text>

  <line x1="460" y1="630" x2="495" y2="630" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="478" y="620" text-anchor="middle" fill="#64748b" font-size="11">cosine</text>

  <line x1="680" y1="630" x2="717" y2="630" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="699" y="620" text-anchor="middle" fill="#64748b" font-size="11">candidates</text>

  <line x1="903" y1="630" x2="935" y2="630" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="919" y="620" text-anchor="middle" fill="#64748b" font-size="11">keep best 3</text>

  <line x1="1120" y1="630" x2="1155" y2="630" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1138" y="620" text-anchor="middle" fill="#64748b" font-size="11">compose</text>

  <!-- Vector index connector: chunks → ANN (dashed amber) -->
  <path d="M 1250 320 C 1250 430, 590 430, 590 560" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-amber)"/>
  <rect x="848" y="410" width="184" height="28" rx="6" fill="#0a0e1a" stroke="#f59e0b" stroke-width="1"/>
  <text x="940" y="429" text-anchor="middle" fill="#fcd34d" font-size="12" font-style="italic">vector index lookup</text>

  <!-- Legend -->
  <g transform="translate(30, 760)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="22" y="11" fill="#cbd5e1" font-size="12">source</text>

    <rect x="90" y="0" width="14" height="14" rx="3" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="112" y="11" fill="#cbd5e1" font-size="12">transform</text>

    <rect x="195" y="0" width="14" height="14" rx="3" fill="#3b2410" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="217" y="11" fill="#cbd5e1" font-size="12">store</text>

    <polygon points="280,7 287,0 294,7 287,14" fill="#3f1d2e" stroke="#ec4899" stroke-width="1.5"/>
    <text x="302" y="11" fill="#cbd5e1" font-size="12">decision</text>

    <rect x="370" y="0" width="14" height="14" rx="3" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
    <text x="392" y="11" fill="#cbd5e1" font-size="12">output</text>

    <line x1="460" y1="7" x2="494" y2="7" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="502" y="11" fill="#cbd5e1" font-size="12">vector index lookup</text>
  </g>
</svg>
